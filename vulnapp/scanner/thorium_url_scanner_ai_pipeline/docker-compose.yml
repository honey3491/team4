services:
  api:
    build: ./api
    container_name: thorium-url-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DB_PATH=/data/findings.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: thorium-url-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
